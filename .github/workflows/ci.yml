name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff · mypy · pytest, SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.10
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --python 3.10

      - name: Ruff (lint + format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest (SQLite)
        run: uv run pytest

      - name: Alembic upgrade head (empty base)
        run: uv run alembic upgrade head

  frontend:
    name: Front-end (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # NOTE: A Postgres integration job MUST be added and pass before switching any
  # environment to Postgres (see CODING_STANDARDS.md — Database / Testing & CI).
