# Alembic configuration for mmm-os (backend database).
#
# The database URL is intentionally NOT set here — it is read from the
# BACKEND_DATABASE_URL environment variable in migrations/env.py so the database
# stays swappable SQLite -> Postgres by config only (see docs/architecture.md).

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

# Timezone for migration filenames (UTC). Leave blank for local time.
# timezone =

[post_write_hooks]
# Optional: format generated migrations with ruff.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
